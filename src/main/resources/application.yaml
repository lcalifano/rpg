spring:
  application:
    name: rpg
  profiles:
    active: local
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5431}/${POSTGRES_DB}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        javax.persistence.schema-generation.scripts.action: create
        javax.persistence.schema-generation.scripts.create-target: src/main/resources/db/migration/generated.sql

  sql:
    init:
      mode: never

jwt:
  secret:
    key: ${JWT_SECRET}
  expiration:
    ms: 3600000